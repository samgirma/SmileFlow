version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smileflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smileflow
      POSTGRES_USER: smileflow_user
      POSTGRES_PASSWORD: smileflow_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - smileflow-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: smileflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smileflow-network

  # Laravel Server (PHP)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smileflow-server
    restart: unless-stopped
    environment:
      APP_NAME: SmileFlow
      APP_ENV: local
      APP_KEY: base64:YourAppKeyHere
      APP_DEBUG: true
      APP_TIMEZONE: UTC
      APP_URL: http://localhost:8000
      
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: smileflow
      DB_USERNAME: smileflow_user
      DB_PASSWORD: smileflow_password
      
      CACHE_DRIVER: redis
      CACHE_HOST: redis
      CACHE_PORT: 6379
      
      SESSION_DRIVER: redis
      SESSION_HOST: redis
      SESSION_PORT: 6379
      
      QUEUE_CONNECTION: sync
      
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./server:/var/www/html
      - /var/www/html/storage
      - /var/www/html/bootstrap/cache
    depends_on:
      - postgres
      - redis
    networks:
      - smileflow-network

  # React Client (Development)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: smileflow-client
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_API_TIMEOUT: 30000
      VITE_AUTH_ENDPOINT: /auth
      VITE_TOKEN_STORAGE_KEY: sf_token
      VITE_USER_STORAGE_KEY: sf_user
      VITE_AI_SERVICE_URL: https://ai.smileflow.com/api
      VITE_AI_SERVICE_KEY: dev_ai_key_12345
      VITE_AI_MODEL: gpt-4
      VITE_GOOGLE_ANALYTICS_ID: 
      VITE_SENTRY_DSN: 
      VITE_STRIPE_PUBLISHABLE_KEY: pk_test_1234567890
      VITE_IMAGE_CDN_URL: https://cdn.smileflow.com
      VITE_IMAGE_PLACEHOLDER_URL: https://images.unsplash.com
      VITE_ENABLE_AI_ASSISTANT: true
      VITE_ENABLE_ANALYTICS: false
      VITE_ENABLE_ERROR_REPORTING: false
    ports:
      - "8080:8080"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    networks:
      - smileflow-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  smileflow-network:
    driver: bridge
